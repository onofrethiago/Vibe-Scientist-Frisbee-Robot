<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Frisby Command Center</title>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo">
          <div class="connecting-glow" id="status-indicator"></div>
          FRISBY ROBOT <span>V1.3</span>
        </div>
        <div class="robot-id" id="status-text">OFFLINE</div>
      </header>

      <main>
        <div class="control-panel">
          
          <!-- SETTINGS CARD -->
          <div class="card settings">
            <label>Link Status</label>
            <div class="input-group">
              <label for="esp-ip">Robot IP Address</label>
              <input type="text" id="esp-ip" placeholder="e.g. 192.168.1.15" value="192.168.1.">
            </div>
            <div class="input-group">
              <label for="motor-speed">Motor Speed (0-255)</label>
              <input type="number" id="motor-speed" min="0" max="255" value="180">
            </div>
          </div>

          <!-- CONTROLS CARD -->
          <div class="card controls">
            <div class="dpad">
              <button class="btn-ctrl" style="grid-area: up" id="btn-up">↑</button>
              <button class="btn-ctrl" style="grid-area: left" id="btn-left">←</button>
              <button class="btn-ctrl btn-stop" style="grid-area: stop" id="btn-stop">■</button>
              <button class="btn-ctrl" style="grid-area: right" id="btn-right">→</button>
              <button class="btn-ctrl" style="grid-area: down" id="btn-down">↓</button>
            </div>
          </div>

        </div>
      </main>

      <footer id="log-container">
        <div class="log-entry active">SYSTEM INITIALIZED</div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
